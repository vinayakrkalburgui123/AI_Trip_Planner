<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Trip Planner</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0077ff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056d6;
        }

        .show-password{
            margin-bottom:15px;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            color:#0077ff;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            id="password"
            placeholder="Password"
            required
        >

        <div class="show-password">
            <input type="checkbox" id="showPass">
            Show Password
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?
        <a href="/register/">Register</a>
    </p>

</div>

<script>
document.getElementById("showPass").addEventListener("change", function() {

    let password = document.getElementById("password");

    if(this.checked){
        password.type = "text";
    }else{
        password.type = "password";
    }

});
</script>

</body>
</html>
