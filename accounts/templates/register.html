{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            width:400px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0077ff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0056d6;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    <form method="POST">

        {% csrf_token %}

        {% if form.errors %}
<div style="color:red; margin-bottom:15px;">
    {{ form.errors }}
</div>
{% endif %}

{{ form.as_p }}

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
